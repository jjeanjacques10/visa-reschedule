services:
  localstack:
    image: localstack/localstack:3.0
    container_name: visa-reschedule-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,dynamodb,eventbridge,cloudwatch,logs
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://visa-reschedule-localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      - localstack

volumes:
  localstack_data:
