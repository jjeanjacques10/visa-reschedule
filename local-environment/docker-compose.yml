services:
  localstack:
    image: localstack/localstack:3.5
    container_name: telegram-producer-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb,eventbridge,cloudwatch,logs
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
